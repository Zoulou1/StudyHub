<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyHub - Learning Platform</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>StudyHub</h1>
      <p>Test your knowledge on DevOps, Programming, and African Development</p>
    </header>

    <!-- Quiz Selection Screen -->
    <div id="quizSelection" class="screen active">
      <h2>Available Quizzes</h2>
      <div id="quizList" class="quiz-list"></div>
    </div>

    <!-- Quiz Taking Screen -->
    <div id="quizScreen" class="screen">
      <div class="quiz-header">
        <h2 id="quizTitle"></h2>
        <p id="progressText"></p>
        <div class="progress-bar">
          <div id="progressFill" class="progress-fill"></div>
        </div>
      </div>
      <div id="questionsContainer"></div>
      <div class="button-group">
        <button id="submitBtn" class="btn btn-primary">Submit Quiz</button>
        <button id="backBtn" class="btn btn-secondary">Back</button>
      </div>
    </div>

    <!-- Results Screen -->
    <div id="resultsScreen" class="screen">
      <h2>Your Results</h2>
      <div class="score-card">
        <div class="score-circle">
          <span id="scorePercentage">0%</span>
        </div>
        <p id="scoreText"></p>
      </div>
      <div id="detailedResults"></div>
      <div class="button-group">
        <button id="retakeBtn" class="btn btn-primary">Retake Quiz</button>
        <button id="backToListBtn" class="btn btn-secondary">Back to Quizzes</button>
      </div>
    </div>

    <footer>
      <p>&copy; 2026 StudyHub. Created for African learners.</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
